<div class="mcp-scope-selector" data-bind="css: {'_disabled': disabled}">
    <label class="mcp-scope-selector__allow-all">
        <input type="checkbox" data-bind="checked: allowAll"/>
        <span class="mcp-scope-selector__allow-all-label" data-bind="i18n: 'Allow all scopes'"></span>
        <span class="mcp-scope-selector__allow-all-note"
              data-bind="i18n: 'Token can call every tool the admin\'s role grants.'"></span>
    </label>

    <!-- ko ifnot: allowAll -->
    <!-- ko ifnot: hasAnyOptions() -->
    <div class="mcp-scope-selector__empty">
        <span data-bind="i18n: 'No scopes available'"></span>
    </div>
    <!-- /ko -->

    <!-- ko if: hasAnyOptions() -->
    <div class="mcp-scope-selector__header">
        <div class="mcp-scope-selector__summary">
            <strong data-bind="text: selectedCount()"></strong>
            <span data-bind="i18n: 'of'"></span>
            <strong data-bind="text: totalCount()"></strong>
            <span data-bind="i18n: 'scopes selected'"></span>
        </div>
        <div class="mcp-scope-selector__search">
            <input type="text"
                   class="admin__control-text mcp-scope-selector__search-input"
                   autocomplete="off"
                   data-bind="
                        textInput: query,
                        attr: {
                            placeholder: $t('Search scopes...'),
                            'aria-label': $t('Search scopes')
                        }"/>
            <!-- ko if: query -->
            <button type="button"
                    class="mcp-scope-selector__search-clear"
                    data-bind="click: clearSearch, attr: {'aria-label': $t('Clear search')}"
                    title="Clear search">
                <span aria-hidden="true">&times;</span>
            </button>
            <!-- /ko -->
        </div>
        <div class="mcp-scope-selector__bulk">
            <button type="button"
                    class="mcp-scope-selector__bulk-action"
                    data-bind="click: selectAll, visible: hasVisibleGroups()">
                <!-- ko if: hasActiveQuery() --><span data-bind="i18n: 'Select all matches'"></span><!-- /ko -->
                <!-- ko ifnot: hasActiveQuery() --><span data-bind="i18n: 'Select all'"></span><!-- /ko -->
            </button>
            <span class="mcp-scope-selector__bulk-sep" data-bind="visible: hasSelection() && hasVisibleGroups()">|</span>
            <button type="button"
                    class="mcp-scope-selector__bulk-action"
                    data-bind="click: clearAll, visible: hasSelection()">
                <span data-bind="i18n: 'Clear all'"></span>
            </button>
        </div>
    </div>

    <div class="mcp-scope-selector__groups">
        <!-- ko foreach: filteredGroups() -->
        <div class="mcp-scope-selector__group" role="group" data-bind="attr: {'aria-label': label}">
            <div class="mcp-scope-selector__group-header">
                <input type="checkbox"
                       class="mcp-scope-selector__group-checkbox"
                       data-bind="
                            checked: allSelected,
                            attr: {'aria-checked': someSelected ? 'mixed' : (allSelected ? 'true' : 'false')},
                            click: $parent.toggleGroupSelection.bind($parent, $data),
                            clickBubble: false,
                            css: {'_indeterminate': someSelected}"/>
                <button type="button"
                        class="mcp-scope-selector__group-toggle"
                        data-bind="
                            click: $parent.toggleGroup.bind($parent, key),
                            clickBubble: false,
                            attr: {'aria-expanded': $parent.isGroupExpanded(key) ? 'true' : 'false'}">
                    <span class="mcp-scope-selector__group-chevron"
                          data-bind="css: {'_open': $parent.isGroupExpanded(key)}">›</span>
                    <span class="mcp-scope-selector__group-label" data-bind="text: label"></span>
                    <span class="mcp-scope-selector__group-count">
                        <span data-bind="text: selectedCount"></span>
                        <span>/</span>
                        <span data-bind="text: totalCount"></span>
                    </span>
                </button>
            </div>
            <!-- ko if: $parent.isGroupExpanded(key) -->
            <ul class="mcp-scope-selector__items">
                <!-- ko foreach: items -->
                <li class="mcp-scope-selector__item">
                    <label class="mcp-scope-selector__item-label">
                        <input type="checkbox"
                               data-bind="checked: $parents[1].value, checkedValue: $data.value"/>
                        <span class="mcp-scope-selector__item-name" data-bind="text: value"></span>
                        <!-- ko if: label && label !== value -->
                        <span class="mcp-scope-selector__item-title" data-bind="text: label, attr: {title: label}"></span>
                        <!-- /ko -->
                    </label>
                </li>
                <!-- /ko -->
            </ul>
            <!-- /ko -->
        </div>
        <!-- /ko -->

        <!-- ko if: hasActiveQuery() && !hasVisibleGroups() -->
        <div class="mcp-scope-selector__empty">
            <span data-bind="i18n: 'No scopes match'"></span>
            <strong>"<span data-bind="text: debouncedQuery"></span>"</strong>
            <button type="button"
                    class="mcp-scope-selector__inline-action"
                    data-bind="click: clearSearch">
                <span data-bind="i18n: 'Clear search'"></span>
            </button>
        </div>
        <!-- /ko -->
    </div>
    <!-- /ko -->
    <!-- /ko -->
</div>
