<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 620" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Cursor Settings Tools and MCPs page with an Installed MCP Servers list and a New MCP Server button">
  <!-- Page background -->
  <rect width="1060" height="620" fill="#181818"/>

  <!-- Settings sidebar -->
  <rect x="0" y="0" width="240" height="620" fill="#202020"/>

  <!-- Account block -->
  <g transform="translate(20, 24)">
    <circle cx="14" cy="14" r="14" fill="#3a3a3a"/>
    <text x="14" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#cccccc">K</text>
    <text x="40" y="13" font-size="12" fill="#e0e0e0">kristofers.ozolins@magebit…</text>
    <text x="40" y="28" font-size="11" fill="#9a9a9a">Team Plan</text>
  </g>

  <!-- Search input -->
  <g transform="translate(20, 76)">
    <rect width="200" height="30" rx="6" fill="#2a2a2a" stroke="#3a3a3a"/>
    <text x="10" y="20" font-size="11" fill="#7a7a7a">Search settings  Ctrl+F</text>
  </g>

  <!-- Sidebar groups -->
  <g font-size="12" fill="#cccccc">
    <text x="20" y="132">General</text>
    <text x="20" y="156">VS Code Settings  ↗</text>

    <text x="20" y="196" fill="#7a7a7a" letter-spacing="0.04em" font-size="11">▽ Agents</text>
    <text x="36" y="220">Tab</text>
    <text x="36" y="240">Models</text>
    <text x="36" y="260">Cloud Agents</text>

    <text x="20" y="296" fill="#7a7a7a" letter-spacing="0.04em" font-size="11">▽ Plugins</text>
    <text x="36" y="320">Rules, Skills, Subagents</text>
    <!-- Tools & MCPs (active) -->
    <rect x="0" y="328" width="240" height="22" fill="#2a2a2a"/>
    <text x="36" y="344" fill="#ffffff">Tools &amp; MCPs</text>
    <text x="36" y="366">Hooks</text>

    <text x="20" y="402" fill="#7a7a7a" letter-spacing="0.04em" font-size="11">▽ Indexing &amp; Docs</text>
    <text x="36" y="426">Network</text>
    <text x="36" y="446">Beta</text>

    <text x="20" y="482" fill="#7a7a7a" letter-spacing="0.04em" font-size="11">▽ Marketplace</text>
    <text x="36" y="506">Docs  ↗</text>
  </g>

  <!-- Main panel -->
  <g transform="translate(264, 24)">
    <!-- Header banner -->
    <g transform="translate(0, 0)">
      <rect width="772" height="56" rx="6" fill="#2a2a2a" stroke="#3a3a3a"/>
      <g transform="translate(16, 16)" fill="#cccccc">
        <path d="M0 4 q0 -4 4 -4 h12 l8 8 v8 q0 4 -4 4 h-16 q-4 0 -4 -4 z" fill="none" stroke="#cccccc" stroke-width="1.4"/>
        <line x1="6" y1="10" x2="18" y2="10" stroke="#cccccc" stroke-width="1.4"/>
      </g>
      <text x="48" y="24" font-size="12" fill="#e0e0e0" font-weight="500">Control and configure your Cursor experience</text>
      <text x="48" y="44" font-size="11" fill="#9a9a9a">Settings are now unified.</text>
    </g>

    <!-- Page title -->
    <text x="0" y="120" font-size="22" font-weight="500" fill="#ffffff">Tools</text>

    <!-- Installed MCP Servers section -->
    <text x="0" y="160" font-size="12" fill="#9a9a9a">Installed MCP Servers</text>

    <!-- Server row: existing example -->
    <g transform="translate(0, 180)">
      <rect width="772" height="56" rx="6" fill="#222222" stroke="#3a3a3a"/>
      <rect x="16" y="14" width="28" height="28" rx="4" fill="#2a2a2a"/>
      <text x="30" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="#cccccc">E</text>
      <text x="58" y="26" font-size="13" fill="#e0e0e0" font-weight="500">example-server</text>
      <circle cx="62" cy="42" r="3" fill="#3ec96a"/>
      <text x="72" y="46" font-size="11" fill="#9a9a9a">24 tools enabled</text>
      <!-- Toggle on -->
      <g transform="translate(720, 18)">
        <rect width="36" height="20" rx="10" fill="#3ec96a"/>
        <circle cx="26" cy="10" r="8" fill="#ffffff"/>
      </g>
    </g>

    <!-- New MCP Server button -->
    <g transform="translate(0, 244)">
      <rect width="772" height="56" rx="6" fill="#222222" stroke="#3a3a3a"/>
      <rect x="16" y="14" width="28" height="28" rx="4" fill="#2a2a2a"/>
      <g transform="translate(24, 22)" stroke="#cccccc" stroke-width="1.6" stroke-linecap="round">
        <line x1="-4" y1="6" x2="16" y2="6"/>
        <line x1="6" y1="-4" x2="6" y2="16"/>
      </g>
      <text x="58" y="26" font-size="13" fill="#e0e0e0" font-weight="500">New MCP Server</text>
      <text x="58" y="44" font-size="11" fill="#9a9a9a">Add a Custom MCP Server</text>
    </g>

    <!-- Plugin MCP Servers -->
    <text x="0" y="332" font-size="12" fill="#9a9a9a">Plugin MCP Servers</text>
    <text x="0" y="350" font-size="11" fill="#7a7a7a">From plugins installed in Cursor</text>

    <g transform="translate(0, 366)">
      <rect width="772" height="48" rx="6" fill="#222222" stroke="#3a3a3a"/>
      <rect x="16" y="12" width="24" height="24" rx="4" fill="#2a2a2a"/>
      <text x="28" y="29" text-anchor="middle" font-size="12" font-weight="700" fill="#cccccc">P</text>
      <text x="50" y="22" font-size="12" fill="#e0e0e0">plugin-example</text>
      <circle cx="54" cy="36" r="3" fill="#3ec96a"/>
      <text x="64" y="40" font-size="11" fill="#9a9a9a">12 tools enabled</text>
      <g transform="translate(720, 14)">
        <rect width="36" height="20" rx="10" fill="#3ec96a"/>
        <circle cx="26" cy="10" r="8" fill="#ffffff"/>
      </g>
    </g>
  </g>
</svg>
