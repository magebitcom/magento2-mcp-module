<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 560" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Magento admin New MCP Connection form Token Info tab with Admin User, Name, Expires At and Allow Write Tools fields">
  <rect width="1060" height="560" fill="#f4f4f4"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="80" height="560" fill="#41362f"/>
  <g transform="translate(22.58 14) scale(0.6452)" fill="#eb5202">
    <path d="M53.692 15.5v31l-7.67 4.43v-31L26.844 8.856 7.67 19.926V50.93L0 46.5v-31L26.845 0z"/>
    <path d="M26.847 62L15.34 55.355V24.357l7.67-4.43V50.93l3.835 2.327 3.837-2.327v-31l7.67 4.427v30.998z"/>
  </g>
  <g text-anchor="middle" font-size="9" fill="#a09a96" letter-spacing="0.04em">
    <text x="40" y="92">DASHBOARD</text>
    <text x="40" y="124">SALES</text>
    <text x="40" y="156">CATALOG</text>
    <text x="40" y="188">CUSTOMERS</text>
    <text x="40" y="220">MARKETING</text>
    <text x="40" y="252">CONTENT</text>
    <text x="40" y="284">REPORTS</text>
    <text x="40" y="316">STORES</text>
  </g>
  <rect x="0" y="336" width="80" height="40" fill="#2c2522"/>
  <text x="40" y="362" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="500" letter-spacing="0.04em">SYSTEM</text>

  <!-- Page heading -->
  <text x="100" y="60" fill="#1a1a1a" font-size="28" font-weight="400">New MCP Connection</text>

  <!-- Sub-header with Back + Save -->
  <rect x="100" y="96" width="940" height="60" fill="#e8e8e8"/>
  <text x="800" y="132" text-anchor="end" font-size="14" fill="#1a1a1a" font-weight="500">← Back</text>
  <g transform="translate(890, 110)">
    <rect width="140" height="32" fill="#eb5202"/>
    <text x="70" y="22" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="500">Save</text>
  </g>

  <!-- Left tabs sidebar -->
  <g transform="translate(100, 184)">
    <rect width="200" height="170" fill="#ffffff" stroke="#cccccc"/>
    <rect x="0" y="0" width="200" height="40" fill="#e8e8e8"/>
    <text x="14" y="26" font-size="12" font-weight="700" fill="#1a1a1a" letter-spacing="0.05em">TOKEN SETTINGS</text>

    <!-- Token Info (active) -->
    <rect x="0" y="60" width="200" height="40" fill="#ffffff"/>
    <rect x="0" y="60" width="4" height="40" fill="#eb5202"/>
    <text x="20" y="86" font-size="13" font-weight="500" fill="#1a1a1a">Token Info</text>

    <!-- Resource Access -->
    <text x="20" y="130" font-size="13" fill="#1a1a1a">Resource Access</text>
  </g>

  <!-- Right form panel -->
  <g transform="translate(330, 184)">
    <rect width="710" height="350" fill="#ffffff" stroke="#cccccc"/>

    <!-- Section heading -->
    <text x="24" y="36" font-size="16" fill="#1a1a1a" font-weight="500">Token Info</text>
    <line x1="24" y1="46" x2="686" y2="46" stroke="#e0e0e0"/>

    <!-- Admin User -->
    <text x="124" y="88" text-anchor="end" font-size="13" fill="#1a1a1a" font-weight="500">Admin User <tspan fill="#e02b27">*</tspan></text>
    <rect x="140" y="68" width="280" height="32" fill="#ffffff" stroke="#1976d2" stroke-width="1.4"/>
    <text x="156" y="88" font-size="13" fill="#1a1a1a">magebit (Magebit Admin)</text>
    <rect x="394" y="68" width="26" height="32" fill="#e8e8e8" stroke="#cccccc"/>
    <text x="407" y="88" text-anchor="middle" font-size="12" fill="#1a1a1a">▾</text>
    <text x="140" y="116" font-size="11" fill="#7a7a7a">Token ACL intersects with this admin's role at every request — deactivating the admin revokes the token implicitly.</text>

    <!-- Name -->
    <text x="124" y="160" text-anchor="end" font-size="13" fill="#1a1a1a" font-weight="500">Name <tspan fill="#e02b27">*</tspan></text>
    <rect x="140" y="140" width="490" height="32" fill="#ffffff" stroke="#cccccc"/>
    <text x="140" y="188" font-size="11" fill="#7a7a7a">A human-readable label, e.g. "Claude Desktop, laptop".</text>

    <!-- Expires At -->
    <text x="124" y="232" text-anchor="end" font-size="13" fill="#1a1a1a" font-weight="500">Expires At (UTC)</text>
    <rect x="140" y="212" width="160" height="32" fill="#ffffff" stroke="#cccccc"/>
    <rect x="302" y="212" width="32" height="32" fill="#e8e8e8" stroke="#cccccc"/>
    <text x="318" y="232" text-anchor="middle" font-size="14" fill="#41362f">📅</text>
    <text x="140" y="260" font-size="11" fill="#7a7a7a">Leave blank for a non-expiring token. Revoke manually when the device is retired.</text>

    <!-- Allow Write Tools -->
    <text x="124" y="304" text-anchor="end" font-size="13" fill="#1a1a1a" font-weight="500">Allow Write Tools</text>
    <rect x="140" y="284" width="80" height="32" fill="#ffffff" stroke="#cccccc"/>
    <text x="156" y="304" font-size="13" fill="#1a1a1a">Yes</text>
    <rect x="194" y="284" width="26" height="32" fill="#e8e8e8" stroke="#cccccc"/>
    <text x="207" y="304" text-anchor="middle" font-size="12" fill="#1a1a1a">▾</text>
    <text x="140" y="332" font-size="11" fill="#7a7a7a">Also requires the global magebit_mcp/general/allow_writes kill-switch to be on.</text>
  </g>
</svg>
